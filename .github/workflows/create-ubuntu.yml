name: Ubuntu 2404 Rootfs

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      rootfs_url:
        description: "自定义 Arch Linux bootstrap URL（可留空使用默认）"
        required: false
        default: ""

jobs:
  archlinux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setting chroot
        env:
          ROOTFS_URL: ${{ github.event.inputs.rootfs_url }}
        run: |
          bash -x ubuntu2404-lite.sh ${{ env.ROOTFS_URL }} || exit 1

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ubuntu 24.04
          draft: false
          prerelease: false
          tag_name: ubuntu2404-latest
          body: |
            Ubuntu 24.04
          files: /tmp/ubuntu2404-latest.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}