name: Wine x86-64 Build Container Ubuntu 24.04

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:

jobs:
  archlinux:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README wine latest update date & Install depends
        run: |
          TZ=Asia/Shanghai
          sudo apt install -y aria2
          git clone --depth=1 https://github.com/Waim908/BCC.git
          # 下载 README 中的 Archlinux Rootfs
          aira2c -s$(nproc) -x$(nproc) https://github.com/Waim908/BCC/releases/download/ubuntu2404-latest/ubuntu2404-latest.tar.xz
          sudo tar -xf ubuntu2404-latest.tar.xz -C /tmp

          sudo chmod 777 BCC/Wine-ubuntu_x86-64-bcc.sh
          sudo cp -r BCC/Wine-ubuntu_x86-64-bcc.sh /tmp/ubuntu2404/bin/
          sudo cp mount.sh /tmp/

          cd /tmp
          bash mount.sh mount ubuntu2404
          sudo chroot ubuntu2404 /bin/Wine-ubuntu_x86-64-bcc.sh
          cd /tmp
          bash mount.sh unmount ubuntu2404

      - name: Package
        run: |
          cd /tmp
          sudo tar -I 'xz -T$(nproc) -9' -cvf wine-ubuntu2404-bcc-amd64.tar.xz ubuntu2404
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Wine x86-64 BCC Ubuntu 24.04
          draft: false
          prerelease: false
          tag_name: wine-bcc-latest
          body: |
            Wine x86-64 BCC rootfs for Ubuntu 24.04
          files: /tmp/wine-ubuntu2404-bcc-amd64.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
