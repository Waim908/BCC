name: Archlinux Rootfs (arm64)

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      rootfs_url:
        description: "自定义 Arch Linux bootstrap URL（可留空使用默认）"
        required: false
        default: "http://os.archlinuxarm.org/os/ArchLinuxARM-aarch64-latest.tar.gz"
  schedule:
    # 北京时间每周日 00:00，对应 UTC 周六 16:00
    - cron: "0 16 * * 6"

jobs:
  archlinux:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setting chroot
        env:
          ROOTFS_URL: ${{ github.event.inputs.rootfs_url }}
        run: |
          bash -x arch-lite.sh ${{ env.ROOTFS_URL }} || exit 1

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Arch Linux arm64
          draft: false
          prerelease: false
          tag_name: archlinuxarm-latest
          body: |
            Arch Linux
          files: /tmp/archlinux-latest.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}