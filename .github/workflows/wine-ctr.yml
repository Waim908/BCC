name: Wine x86-64 Build Container ARM64

permissions:
  contents: write
  packages: write

on:
  workflow_dispatch:
  schedule:
    # 北京时间每周日 01:00，对应 UTC 周六 17:00
    - cron: "0 17 * * 6"

jobs:
  archlinux:
    runs-on: ubuntu-24.04-arm
    steps:
      # 直接在 /tmp 下构建，避免污染 workspace
      - name: Setting chroot from prebuilt rootfs
        run: |
          cd /tmp
          git clone https://github.com/Waim908/BCC BCC

          # 下载 README 中的 Archlinux Rootfs
          wget -O archlinux-latest.tar.xz https://github.com/Waim908/BCC/releases/download/archlinux-latest/archlinux-latest.tar.xz

          # 解包为 archlinux 目录
          mkdir archlinux
          sudo tar -I 'xz -T$(nproc)' -xvf archlinux-latest.tar.xz -C archlinux --strip-components=1

          cp /tmp/BCC/Wine_x86-64-bcc.sh /tmp
          cp /tmp/BCC/mount.sh /tmp

          cd /tmp
          bash mount.sh mount archlinux
          chmod 777 Wine_x86-64-bcc.sh
          sudo cp Wine_x86-64-bcc.sh archlinux/bin/
          sudo chroot archlinux /bin/Wine_x86-64-bcc.sh &&
          cd /tmp
          bash mount.sh unmount archlinux

      - name: Package
        run: |
          cd /tmp
          sudo tar -I 'xz -T$(nproc)' -cvf wine-bcc.tar.xz archlinux

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: Wine x86-64 BCC
          draft: false
          prerelease: false
          tag_name: wine-bcc-latest
          body: |
            Wine x86-64 BCC rootfs
          files: /tmp/wine-bcc.tar.xz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
